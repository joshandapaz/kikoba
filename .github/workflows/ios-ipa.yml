name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Clean API Routes for Static Export
        run: rm -rf app/api

      - name: Build Web Assets (Static Export)
        run: npm run static
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://192.168.0.101:5172' }}
          NEXTAUTH_URL: "http://192.168.0.101:5172"
          NEXTAUTH_SECRET: "kikoba-smart-super-secret-key-2024"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Add Capacitor iOS
        run: npx cap add ios || echo "Initial sync failed as expected, patching now..."

      - name: Patch iOS Deployment Target (Required for AdMob)
        run: |
          echo "Forcing iOS 15.3 everywhere..."
          # Update Xcode project target
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.3/g" ios/App/App.xcodeproj/project.pbxproj
          
          # Use Ruby to robustly patch the Podfile
          ruby -e "
          content = File.read('ios/App/Podfile')
          content.gsub!(/platform :ios, .*/, \"platform :ios, '15.3'\")
          hook = %Q{
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.3'
              end
            end
          end
          }
          if content.include?('post_install')
            content.gsub!(/post_install do \\|installer\\|.*?end/m, hook)
          else
            content += \"\\n\" + hook
          end
          File.write('ios/App/Podfile', content)
          "
          echo "Final Podfile check:"
          cat ios/App/Podfile

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Patch Info.plist (Networking & Permissions)
        run: |
          PLIST="ios/App/App/Info.plist"
          echo "Patching $PLIST..."
          plutil -replace NSAppTransportSecurity -xml "<dict><key>NSAllowsLocalNetworking</key><true/><key>NSAllowsArbitraryLoads</key><true/><key>NSAllowsArbitraryLoadsInWebContent</key><true/></dict>" "$PLIST"
          plutil -replace NSLocalNetworkUsageDescription -string "Kikoba Smart needs local network access to connect to the server." "$PLIST" || \
          plutil -insert NSLocalNetworkUsageDescription -string "Kikoba Smart needs local network access to connect to the server." "$PLIST"
          plutil -replace NSBonjourServices -xml "<array><string>_http._tcp.</string></array>" "$PLIST" || \
          plutil -insert NSBonjourServices -xml "<array><string>_http._tcp.</string></array>" "$PLIST"
          # Add AdMob App ID (Placeholder - User should update in GitHub Secrets if possible)
          plutil -replace GADApplicationIdentifier -string "ca-app-pub-3940256099942544~1458002511" "$PLIST" || \
          plutil -insert GADApplicationIdentifier -string "ca-app-pub-3940256099942544~1458002511" "$PLIST"

      - name: Capacitor Build iOS (Unsigned)
        run: |
          npx cap build ios --scheme App --configuration Release --no-open
          # The build assets are located in ios/App/build/Release-iphoneos/App.app 
          # but cap build might put them in a different derived data path.
          # We will package the result from the default derived data location.
          
      - name: Create IPA Package (Official Method)
        run: |
          mkdir -p build/Payload
          # Search for the .app file in the derived data path
          APP_PATH=$(find ios/App/build -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            # Fallback to common location
            APP_PATH="ios/App/build/Build/Products/Release-iphoneos/App.app"
          fi
          echo "Found App at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload
          cd build
          zip -m -r Kikoba-App.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: Kikoba-App-IPA
          path: build/Kikoba-App.ipa
          if-no-files-found: error
          retention-days: 5
