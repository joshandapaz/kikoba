name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build Web Assets (Static Export)
        run: npm run static
        env:
          NEXT_PUBLIC_EXPORT: "true"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: "https://anti-three-orpin.vercel.app"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Patch Xcode Project Target
        run: |
          echo "Forcing iOS 15.3 in Xcode project..."
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9\.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.3/g" ios/App/App.xcodeproj/project.pbxproj

      - name: Xcode Build (Unsigned Archive)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -destination 'generic/platform=iOS' \
                     -archivePath ios/App/App.xcarchive \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     AD_HOC_CODE_SIGNING_ALLOWED=YES \
                     archive

      - name: Create IPA Package (Unsigned)
        run: |
          mkdir -p build/Payload
          cp -r ios/App/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build
          zip -m -r Kikoba-App.ipa Payload
          echo "IPA created at $(pwd)/Kikoba-App.ipa"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: iOS Build ${{ github.run_number }}
          files: build/Kikoba-App.ipa
          draft: false
          prerelease: false
          body: |
            Automated iOS (IPA) Build.
            PesaPal v3 integration included.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
