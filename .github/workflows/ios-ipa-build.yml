name: Build iOS Native IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA (Clean)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.1.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Clean API Routes for Static Export
        run: rm -rf app/api

      - name: Build Web Assets (Static)
        run: npm run static
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: "http://192.168.0.101:3000"
          NEXTAUTH_SECRET: "kikoba-smart-super-secret-key-2024"
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Add Capacitor iOS
        run: npx cap add ios

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Patch Info.plist for Local Networking
        run: |
          PLIST="ios/App/App/Info.plist"
          echo "Patching $PLIST for local networking support..."
          # Update App Transport Security for Local Networking
          plutil -replace NSAppTransportSecurity -xml "<dict><key>NSAllowsLocalNetworking</key><true/><key>NSAllowsArbitraryLoads</key><true/></dict>" "$PLIST"
          # Add Local Network Usage Description (Mandatory for iOS 14+)
          plutil -insert NSLocalNetworkUsageDescription -string "Kikoba Smart needs access to your local network to connect to the development server at 192.168.0.101" "$PLIST"
          # Verify the changes
          echo "Verifying Info.plist changes:"
          plutil -p "$PLIST" | grep -A 5 NSAppTransportSecurity
          plutil -p "$PLIST" | grep NSLocalNetworkUsageDescription

      - name: Xcode Build (Unsigned)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO | xcpretty

      - name: Create IPA Package
        run: |
          mkdir -p build/Payload
          cp -r ios/App/build/Build/Products/Release-iphoneos/App.app build/Payload
          cd build
          zip -m -r Kikoba-App.ipa Payload

      - name: Upload Finished Artifact
        uses: actions/upload-artifact@v4.3.3
        with:
          name: Kikoba-App-IPA
          path: build/Kikoba-App.ipa
          if-no-files-found: error
          retention-days: 1
